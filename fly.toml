# fly.toml app configuration file generated for ace-mcp on 2026-06-16T12:18:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ace-mcp'
primary_region = 'ams'

[build]

[env]
  ACE_BIND_ADDR = '0.0.0.0:8080'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
